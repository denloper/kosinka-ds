<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🃏 Пасьянс Косынка | Discord Activity</title>
    <style>
        :root {
            --body-bg: radial-gradient(circle at 50% 50%, #1a2438 0%, #090c14 100%);
            --game-bg: rgba(18, 25, 42, 0.4);
            --game-border: rgba(212, 175, 55, 0.15);
            --game-shadow: 0 20px 60px rgba(0,0,0,0.7);
            --canvas-bg: #111c2f;
            --canvas-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.6);
            --button-bg: rgba(30, 45, 70, 0.6);
            --button-border: rgba(212, 175, 55, 0.3);
            --button-hover-bg: rgba(212, 175, 55, 0.15);
            --title-color: #ebc25e;
            --info-color: #8d98b0;
            --win-color: #ebc25e;
            --modal-bg: #151e2e;
            --modal-border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--body-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #e0e0e0;
            user-select: none;
            transition: background 0.6s ease;
        }
        #game {
            text-align: center;
            background: var(--game-bg);
            backdrop-filter: blur(8px);
            padding: 25px 30px;
            border-radius: 24px;
            border: 1px solid var(--game-border);
            box-shadow: var(--game-shadow);
            width: 95vw;
            max-width: 1120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
        }
        h1 {
            margin-bottom: 12px;
            font-size: 32px;
            letter-spacing: 2px;
            color: var(--title-color);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transition: color 0.6s ease;
        }
        #status { margin-bottom: 10px; font-size: 14px; min-height: 20px; }
        canvas {
            border-radius: 16px;
            background: var(--canvas-bg);
            cursor: grab;
            box-shadow: var(--canvas-shadow);
            border: 1px solid rgba(212, 175, 55, 0.1);
            display: block;
        }
        canvas:active { cursor: grabbing; }
        .info {
            margin-top: 14px;
            font-size: 14px;
            color: var(--info-color);
            letter-spacing: 0.5px;
            transition: color 0.6s ease;
        }
        .win {
            color: var(--win-color);
            font-size: 26px;
            font-weight: bold;
            margin-top: 12px;
            animation: pulse 1.5s infinite;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .btn-row {
            margin-top: 15px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 14px 32px;
            color: #e0e0e0;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            font-family: 'Georgia', 'Times New Roman', serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-3px);
            background: var(--button-hover-bg);
            border-color: var(--title-color);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
        }
        .btn-new { color: #e6c86a; }
        .btn-spectate { color: #b0bce6; }
        .btn-share { color: #9aaec2; }
        .btn-theme { color: #c0a0b0; }
        .btn-hint { color: #f0d060; }
        .btn-undo { color: #a0c0f0; }
        .hidden { display: none !important; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--modal-bg); border: 1px solid var(--modal-border); border-radius: 20px;
            padding: 25px; max-width: 480px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { margin-bottom: 15px; color: var(--title-color); font-size: 20px; }
        .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .theme-card { /* ... стили карточек тем ... */ }
        .close-btn { margin-top: 10px; padding: 12px 24px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #b0bce6; cursor: pointer; }
    </style>
</head>
<body>
<div id="game">
    <h1>🕯 Пасьянс Косынка</h1>
    <div id="status">Подключение...</div>
    <canvas id="canvas"></canvas>
    <div class="info">🖱 Перетаскивайте карты | Двойной клик — авто в стопку</div>
    <div id="winMessage"></div>
    <div class="btn-row">
        <button class="btn-new" id="btnNewGame" onclick="sendAction('new_game')">🔄 Новая игра</button>
        <button class="btn-spectate" id="btnWatch" onclick="openWatchModal()">👁 Смотреть игру</button>
        <button class="btn-share" id="btnShare" onclick="shareGame()">🔗 Поделиться</button>
        <button class="btn-hint" id="btnHint" onclick="sendAction('hint')">💡 Подсказка</button>
        <button class="btn-undo" id="btnUndo" onclick="sendAction('undo')">↩ Отмена</button>
        <button class="btn-theme" onclick="showThemePicker()">🎨 Тема</button>
    </div>
</div>

<!-- Модальное окно темы -->
<div class="modal" id="themeModal">
    <div class="modal-content">
        <h3>🎨 Выберите тему</h3>
        <div class="theme-grid" id="themeGrid"></div>
        <button class="reset-btn" onclick="resetTheme()">↩ Стандартная тема</button>
        <button class="close-btn" onclick="closeThemePicker()">✕ Закрыть</button>
    </div>
</div>

<!-- Модальное окно наблюдения -->
<div class="modal" id="watchModal">
    <div class="modal-content">
        <h3>👁 Выберите игру для наблюдения</h3>
        <div id="gameList">Поиск активных игр...</div>
        <div id="manualJoin">
            <input type="text" id="manualGameId" placeholder="Введите ID игры">
            <button onclick="joinManualGame()">▶ Смотреть</button>
        </div>
        <button class="close-btn" onclick="closeWatchModal()">✕ Закрыть</button>
    </div>
</div>

function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, duration, type = 'sine', vol = 0.1) { /* ... реализация ... */ }
function playPlace() { playTone(1200, 0.1, 'triangle', 0.08); }
function playWin() {

}

// ============ ПОДКЛЮЧЕНИЕ ============
function connect() {
    const urlParams = new URLSearchParams(window.location.search);
    const paramGameId = urlParams.get('game');
    gameId = paramGameId || Math.random().toString(36).substr(2, 6);
    isWatcher = paramGameId && urlParams.has('watch');

    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
        document.getElementById('status').textContent = 'Подключено, загрузка игры...';
        if (isWatcher) {
            ws.send(JSON.stringify({ action: 'join', game_id: gameId }));
        } else {
            ws.send(JSON.stringify({ action: 'create', game_id: gameId }));
        }
    };
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'state') {
            gameState = data.state;
            document.getElementById('status').textContent = 'Игра загружена';
            draw();
            if (data.state.win) playWin();
        } else if (data.type === 'error') {
            document.getElementById('status').textContent = 'Ошибка: ' + data.message;
        } else if (data.type === 'hint') {
            alert(data.hint ? 'Подсказка: ...' : 'Нет доступных ходов');
        }
    };
    ws.onclose = () => { document.getElementById('status').textContent = 'Соединение закрыто, переподключение...'; setTimeout(connect, 3000); };
    ws.onerror = () => document.getElementById('status').textContent = 'Ошибка подключения к серверу';
}

function sendAction(action, payload = {}) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ action, ...payload }));
}

canvas.addEventListener('mousedown', (e) => {

canvas.addEventListener('mousemove', (e) => {

canvas.addEventListener('mouseup', (e) => {

</html>
