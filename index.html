// ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
let ws = null;
let gameState = null, gameId = null, isWatcher = false;
let drag = null, dragCards = [], fromCol = -1, fromWaste = false;
let mouseX = 0, mouseY = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ============ ЗВУКИ ============
let audioCtx = null;
function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, duration, type = 'sine', vol = 0.1) {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}
function playPlace() { playTone(1200, 0.1, 'triangle', 0.08); }
function playWin() {
    ensureAudio();
    [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'triangle', 0.12), i*100));
}

// ============ ПОДКЛЮЧЕНИЕ (с обходом страницы localtunnel) ============
function connect() {
    const urlParams = new URLSearchParams(window.location.search);
    const paramGameId = urlParams.get('game');
    gameId = paramGameId || Math.random().toString(36).substr(2, 6);
    isWatcher = paramGameId && urlParams.has('watch');

    // Отправляем HTTP-запрос с заголовком bypass-tunnel-reminder,
    // чтобы localtunnel пропустил последующие WebSocket-соединения без страницы подтверждения.
    fetch(`https://${WS_URL.split('://')[1]}/`, {
        headers: { 'bypass-tunnel-reminder': 'true' }
    }).catch(() => {});

    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
        document.getElementById('status').textContent = 'Подключено, загрузка игры...';
        if (isWatcher) {
            ws.send(JSON.stringify({ action: 'join', game_id: gameId }));
        } else {
            ws.send(JSON.stringify({ action: 'create', game_id: gameId }));
        }
    };
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'ping') return;
        if (data.type === 'state') {
            gameState = data.state;
            document.getElementById('status').textContent = 'Игра загружена';
            draw();
            if (data.state.win) playWin();
        } else if (data.type === 'error') {
            document.getElementById('status').textContent = 'Ошибка: ' + data.message;
        } else if (data.type === 'hint') {
            alert(data.hint ? `Подсказка: переместите карту(ы) из ${JSON.stringify(data.hint.from)} в ${JSON.stringify(data.hint.to)}` : 'Нет доступных ходов');
        }
    };
    ws.onclose = () => {
        document.getElementById('status').textContent = 'Соединение закрыто, переподключение...';
        setTimeout(connect, 3000);
    };
    ws.onerror = () => document.getElementById('status').textContent = 'Ошибка подключения к серверу';
}

function sendAction(action, payload = {}) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ action, ...payload }));
}

// ============ ОТРИСОВКА ============
let backPattern = document.createElement('canvas');
function generateBackPattern() {
    backPattern.width = CARD_W * dpr;
    backPattern.height = CARD_H * dpr;
    const bctx = backPattern.getContext('2d');
    bctx.scale(dpr, dpr);
    bctx.fillStyle = cardColors.backColor;
    bctx.fillRect(0, 0, CARD_W, CARD_H);
    bctx.strokeStyle = cardColors.backBorder;
    bctx.lineWidth = 1.8;
    bctx.strokeRect(4, 4, CARD_W-8, CARD_H-8);
    bctx.fillStyle = cardColors.backPattern;
    const sp = 22, ox = (CARD_W % sp)/2, oy = (CARD_H % sp)/2;
    for (let x = ox+sp/2; x < CARD_W-ox; x += sp)
        for (let y = oy+sp/2; y < CARD_H-oy; y += sp) {
            bctx.beginPath(); bctx.arc(x, y, 3.5, 0, Math.PI*2); bctx.fill();
        }
    bctx.setTransform(1,0,0,1,0,0);
}
generateBackPattern();

function draw() {
    if (!gameState) return;
    canvas.width = Math.min(1100, window.innerWidth-20);
    canvas.height = Math.min(700, window.innerHeight-100);
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Фонды
    let x = 20, y = 10;
    for (let s of SUITS) {
        const f = gameState.foundations[s];
        ctx.strokeStyle = '#aaa'; ctx.setLineDash([5,5]);
        ctx.strokeRect(x, y, CARD_W, CARD_H); ctx.setLineDash([]);
        if (f.length) drawCard(f[0], x, y);
        x += CARD_W + 6;
    }
    // Сток и отвал
    let stockX = 20 + 4*(CARD_W+6) + 20;
    ctx.strokeStyle = '#aaa'; ctx.setLineDash([5,5]);
    ctx.strokeRect(stockX, 10, CARD_W, CARD_H); ctx.setLineDash([]);
    if (gameState.stock_count > 0) drawCardBack(stockX, 10);
    if (gameState.waste.length) drawCard(gameState.waste[0], stockX + CARD_W + 12, 10);

    // Столбцы
    let cx = 20, cy = 150;
    for (let col of gameState.columns) {
        if (col.length === 0) {
            ctx.strokeStyle = '#aaa'; ctx.setLineDash([5,5]);
            ctx.strokeRect(cx, cy, CARD_W, CARD_H); ctx.setLineDash([]);
        }
        for (let i = 0; i < col.length; i++) {
            const card = col[i];
            card.x = cx; card.y = cy + i*CARD_OVERLAP;
            if (!dragCards.includes(card)) drawCard(card, card.x, card.y);
        }
        cx += CARD_W + 9;
    }
    // Перетаскиваемые карты
    if (drag && dragCards.length) {
        for (let i = 0; i < dragCards.length; i++) {
            drawCard(dragCards[i], mouseX - drag.offsetX + i*2, mouseY - drag.offsetY + i*2);
        }
    }
    ctx.font = '14px Georgia'; ctx.fillStyle = '#ddd';
    ctx.fillText(`Ходов: ${gameState.moves}`, canvas.width-100, canvas.height-10);
}

function drawCard(card, x, y) {
    if (!card.face_up) return drawCardBack(x, y);
    ctx.fillStyle = cardColors.faceBg;
    ctx.fillRect(x, y, CARD_W, CARD_H);
    ctx.strokeStyle = cardColors.frameOuter; ctx.lineWidth = 1.4;
    ctx.strokeRect(x+1, y+1, CARD_W-2, CARD_H-2);
    ctx.strokeStyle = cardColors.frameInner; ctx.lineWidth = 0.6;
    ctx.strokeRect(x+5, y+5, CARD_W-10, CARD_H-10);
    ctx.fillStyle = (card.suit==='♥'||card.suit==='♦') ? cardColors.redText : cardColors.blackText;
    ctx.font = 'bold 18px Georgia'; ctx.fillText(card.rank, x+12, y+22);
    ctx.font = '14px Georgia'; ctx.fillText(card.suit, x+12, y+38);
    ctx.save(); ctx.translate(x+CARD_W-18, y+CARD_H-18); ctx.rotate(Math.PI);
    ctx.font = 'bold 18px Georgia'; ctx.fillText(card.rank, 0, 0);
    ctx.font = '14px Georgia'; ctx.fillText(card.suit, 0, 17);
    ctx.restore();
    ctx.globalAlpha = 0.35; ctx.font = '48px Georgia'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(card.suit, x+CARD_W/2, y+CARD_H/2);
    ctx.textAlign = 'start'; ctx.globalAlpha = 1;
    if (['J','Q','K'].includes(card.rank)) {
        ctx.beginPath(); ctx.ellipse(x+CARD_W/2, y+CARD_H/2, 22, 30, 0, 0, Math.PI*2);
        ctx.strokeStyle = cardColors.backBorder; ctx.lineWidth = 1.6; ctx.stroke();
        ctx.fillStyle = cardColors.backPattern.replace(')', ', 0.1)').replace('rgba','rgba'); ctx.fill();
    }
}

function drawCardBack(x, y) {
    ctx.fillStyle = cardColors.backColor;
    ctx.fillRect(x, y, CARD_W, CARD_H);
    ctx.strokeStyle = cardColors.backBorder; ctx.lineWidth = 1.8;
    ctx.strokeRect(x+4, y+4, CARD_W-8, CARD_H-8);
    ctx.fillStyle = cardColors.backPattern;
    const sp = 22, ox = (CARD_W % sp)/2, oy = (CARD_H % sp)/2;
    for (let i = ox+sp/2; i < CARD_W-ox; i += sp)
        for (let j = oy+sp/2; j < CARD_H-oy; j += sp) {
            ctx.beginPath(); ctx.arc(x+i, y+j, 3.5, 0, Math.PI*2); ctx.fill();
        }
}

// ============ УПРАВЛЕНИЕ МЫШЬЮ ============
canvas.addEventListener('mousedown', (e) => {
    if (!gameState || isWatcher) return;
    const mx = e.offsetX, my = e.offsetY;
    let stockX = 20 + 4*(CARD_W+6) + 20;
    if (mx >= stockX && mx <= stockX+CARD_W && my >= 10 && my <= 10+CARD_H) {
        sendAction('click_stock'); return;
    }
    if (gameState.waste.length) {
        let wx = stockX+CARD_W+12, wy = 10;
        if (mx >= wx && mx <= wx+CARD_W && my >= wy && my <= wy+CARD_H) {
            const card = gameState.waste[0]; card.x = wx; card.y = wy;
            startDrag([card], -1, true, mx, my); return;
        }
    }
    let cx = 20, cy = 150;
    for (let i = 0; i < gameState.columns.length; i++) {
        const col = gameState.columns[i];
        for (let j = col.length-1; j >= 0; j--) {
            const card = col[j];
            if (!card.face_up) break;
            const cardY = cy + j*CARD_OVERLAP;
            if (mx >= cx && mx <= cx+CARD_W && my >= cardY && my <= cardY+CARD_H) {
                const group = col.slice(j);
                if (group.length) { group[0].x = cx; group[0].y = cardY; }
                startDrag(group, i, false, mx, my); return;
            }
        }
        cx += CARD_W + 9;
    }
});

function startDrag(cards, col, waste, mx, my) {
    drag = { cards, col, waste, offsetX: mx - cards[0].x, offsetY: my - cards[0].y };
    dragCards = cards; fromCol = col; fromWaste = waste;
    mouseX = mx; mouseY = my;
    draw();
}

canvas.addEventListener('mousemove', (e) => {
    if (!drag) return;
    mouseX = e.offsetX; mouseY = e.offsetY;
    draw();
});

canvas.addEventListener('mouseup', (e) => {
    if (!drag) return;
    const mx = e.offsetX, my = e.offsetY;
    let targetType = null, targetIndex = null, targetSuit = null;
    let fx = 20, fy = 10;
    for (let s of SUITS) {
        if (mx >= fx && mx <= fx+CARD_W && my >= fy && my <= fy+CARD_H) { targetType = 'foundation'; targetSuit = s; break; }
        fx += CARD_W + 6;
    }
    if (!targetType) {
        let cx = 20, cy = 150;
        for (let i = 0; i < 7; i++) {
            if (mx >= cx && mx <= cx+CARD_W && my >= cy) { targetType = 'column'; targetIndex = i; break; }
            cx += CARD_W + 9;
        }
    }
    if (targetType) {
        sendAction('move', {
            from: fromWaste ? { type: 'waste' } : { type: 'column', index: fromCol },
            card_count: dragCards.length,
            to: targetType === 'foundation' ? { type: 'foundation', suit: targetSuit } : { type: 'column', index: targetIndex }
        });
        playPlace();
    }
    drag = null; dragCards = [];
    draw();
});

canvas.addEventListener('dblclick', (e) => {
    if (!gameState || isWatcher) return;
    const mx = e.offsetX, my = e.offsetY;
    let cx = 20, cy = 150;
    for (let i = 0; i < gameState.columns.length; i++) {
        const col = gameState.columns[i];
        if (col.length) {
            const card = col[col.length-1];
            const cardY = cy + (col.length-1)*CARD_OVERLAP;
            if (mx >= cx && mx <= cx+CARD_W && my >= cardY && my <= cardY+CARD_H) {
                sendAction('auto_move', { from: { type: 'column', index: i } }); return;
            }
        }
        cx += CARD_W + 9;
    }
    let stockX = 20 + 4*(CARD_W+6) + 20;
    let wx = stockX+CARD_W+12, wy = 10;
    if (gameState.waste.length && mx >= wx && mx <= wx+CARD_W && my >= wy && my <= wy+CARD_H) {
        sendAction('auto_move', { from: { type: 'waste' } });
    }
});

// ============ ТЕМЫ ============
function applyTheme(t) {
    const root = document.documentElement;
    Object.entries(t.vars).forEach(([k,v]) => root.style.setProperty(k,v));
    cardColors = { ...t.card };
    generateBackPattern();
    draw();
}
function loadTheme() {
    const saved = localStorage.getItem('solitaire_theme');
    if (saved) { const i = parseInt(saved); if (i>=0 && i<themes.length) { applyTheme(themes[i]); return; } }
    applyTheme(themes[0]);
}
function saveThemeIndex(i) { localStorage.setItem('solitaire_theme', i); }
function resetTheme() { applyTheme(themes[0]); saveThemeIndex(0); closeThemePicker(); }
function showThemePicker() {
    const grid = document.getElementById('themeGrid'); grid.innerHTML = '';
    themes.forEach((t,i) => {
        const d = document.createElement('div'); d.className = 'theme-card';
        d.innerHTML = `<div class="theme-preview" style="background:${t.vars['--body-bg']}"></div><div class="theme-label">${t.name}</div>`;
        d.onclick = () => { applyTheme(t); saveThemeIndex(i); closeThemePicker(); };
        grid.appendChild(d);
    });
    document.getElementById('themeModal').classList.add('show');
}
function closeThemePicker() { document.getElementById('themeModal').classList.remove('show'); }
document.getElementById('themeModal').addEventListener('click', (e) => { if (e.target === document.getElementById('themeModal')) closeThemePicker(); });

// ============ МОДАЛЬНОЕ ОКНО НАБЛЮДЕНИЯ ============
let watchListWs = null;
function openWatchModal() {
    document.getElementById('watchModal').classList.add('show');
    document.getElementById('gameList').innerHTML = 'Поиск активных игр...';
    if (watchListWs) { watchListWs.close(); watchListWs = null; }
    watchListWs = new WebSocket(WS_URL);
    watchListWs.onopen = () => watchListWs.send(JSON.stringify({ action: 'list' }));
    watchListWs.onmessage = (e) => {
        try {
            const d = JSON.parse(e.data);
            if (d.type === 'game_list') {
                const games = d.games || [];
                const listDiv = document.getElementById('gameList');
                if (!games.length) listDiv.innerHTML = '<p style="color:#aaa;">Нет активных игр.</p>';
                else if (games.length === 1) { closeWatchModal(); window.location.href = `?game=${games[0].id}&watch=true`; }
                else listDiv.innerHTML = games.map(g => `<div class="game-item" onclick="watchGameById('${g.id}')"><span>Игра <span class="game-id">${g.id}</span></span><span style="font-size:12px;color:#8d98b0;">👁 ${g.spectators||0}</span></div>`).join('');
            }
        } catch { document.getElementById('gameList').innerHTML = '<p style="color:#aaa;">Список не загружен.</p>'; }
    };
}
function closeWatchModal() { document.getElementById('watchModal').classList.remove('show'); if (watchListWs) watchListWs.close(); }
function watchGameById(id) { closeWatchModal(); window.location.href = `?game=${id}&watch=true`; }
function joinManualGame() { const id = document.getElementById('manualGameId').value.trim(); if (id) watchGameById(id); }
document.getElementById('watchModal').addEventListener('click', (e) => { if (e.target === document.getElementById('watchModal')) closeWatchModal(); });
function shareGame() { if (gameId) navigator.clipboard.writeText(window.location.href).then(() => alert('🔗 Ссылка скопирована!')); else alert('Создайте игру через /solitaire'); }

// ============ СТАРТ ============
loadTheme();
connect();
</script>
